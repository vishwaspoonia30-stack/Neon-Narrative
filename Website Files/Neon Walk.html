<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Walk — Cinematic Background</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #02030a; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #e7ecf3; }

  #root { position: relative; width: 100vw; height: 100vh; }

  /* ── Heads-up note ─────────────────────────── */
  .note {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 200;
    max-width: 360px;
    background: rgba(10,12,20,0.78);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.55;
    color: #c8d0dc;
  }
  .note strong { color: #fff; }
  .note .hide { float: right; cursor: pointer; opacity: 0.6; padding-left: 8px; }
  .note .hide:hover { opacity: 1; }

  /* ── Stage ────────────────────────────────── */
  .stage {
    position: absolute; inset: 0;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 70% at 50% 30%, #0d1224 0%, #060818 35%, #02030a 80%);
  }

  /* Sky gradient w/ subtle aurora hint */
  .sky {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 55%;
    background:
      radial-gradient(ellipse 60% 40% at 30% 60%, rgba(180, 60, 200, 0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 70% 70%, rgba(60, 130, 220, 0.10), transparent 60%),
      linear-gradient(180deg, #050714 0%, #08101e 60%, #0a1a2e 100%);
  }

  /* Distant stars */
  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 8%,  #cdd5e0, transparent),
      radial-gradient(1px 1px at 27% 22%, #aab2c2, transparent),
      radial-gradient(1px 1px at 41% 6%,  #c1c8d4, transparent),
      radial-gradient(1px 1px at 58% 14%, #9aa3b4, transparent),
      radial-gradient(1px 1px at 71% 9%,  #b8c0d0, transparent),
      radial-gradient(1px 1px at 85% 18%, #cbd2dc, transparent),
      radial-gradient(1px 1px at 92% 4%,  #94a0b6, transparent);
    opacity: 0.35;
  }

  /* Ground / road plane — drawn in CSS perspective */
  .ground-wrap {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 60%;
    perspective: 700px;
    perspective-origin: 50% 0%;
  }
  .ground {
    position: absolute;
    left: 50%;
    top: 0;
    width: 600vw;
    height: 200vh;
    transform: translateX(-50%) rotateX(75deg);
    transform-origin: 50% 0%;
    background:
      /* asphalt base */
      radial-gradient(ellipse 60% 80% at 50% 5%, #1a2236 0%, #0a0f1a 50%, #04060e 90%),
      #04060e;
  }
  /* Snow texture moving toward camera */
  .ground-snow {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(220,230,255,0.55) 0.6px, transparent 1.6px),
      radial-gradient(circle at 55% 70%, rgba(220,230,255,0.45) 0.6px, transparent 1.6px),
      radial-gradient(circle at 80% 22%, rgba(220,230,255,0.5)  0.6px, transparent 1.6px),
      radial-gradient(circle at 35% 88%, rgba(220,230,255,0.4)  0.6px, transparent 1.6px),
      radial-gradient(circle at 70% 50%, rgba(220,230,255,0.5)  0.6px, transparent 1.6px);
    background-size: 120px 120px;
    opacity: 0.55;
    animation: groundScroll var(--ground-speed, 4s) linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes groundScroll {
    from { background-position: 0 0; }
    to   { background-position: 0 240px; }
  }
  /* Tire / road darker line center to imply lane */
  .ground-lane {
    position: absolute;
    left: 50%; top: 0;
    width: 22vw; height: 100%;
    transform: translateX(-50%);
    background: linear-gradient(180deg,
      rgba(8,10,18,0.0) 0%,
      rgba(8,10,18,0.55) 30%,
      rgba(8,10,18,0.85) 100%);
  }

  /* Horizon fog wall */
  .fog {
    position: absolute;
    left: 0; right: 0;
    bottom: 38%;
    height: 38%;
    background: linear-gradient(180deg,
      rgba(20, 30, 50, 0.0) 0%,
      rgba(20, 30, 50, 0.55) 35%,
      rgba(15, 22, 40, 0.90) 100%);
    pointer-events: none;
    filter: blur(6px);
  }

  /* Volumetric color fog band — picks up neon */
  .colorfog {
    position: absolute;
    left: -10%; right: -10%;
    bottom: 30%;
    height: 35%;
    background:
      radial-gradient(ellipse 40% 60% at 50% 100%, var(--neon-magenta-soft), transparent 70%),
      radial-gradient(ellipse 50% 50% at 35% 90%, var(--neon-blue-soft),    transparent 70%),
      radial-gradient(ellipse 50% 50% at 65% 90%, var(--neon-blue-soft),    transparent 70%);
    pointer-events: none;
    mix-blend-mode: screen;
    filter: blur(40px);
    opacity: var(--fog-glow, 0.7);
  }

  /* ── Lamp ─────────────────────────────────── */
  .world {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .lamp {
    position: absolute;
    left: 50%; top: 0;
    width: 0; height: 0;
    will-change: transform;
  }

  .lamp-pole {
    position: absolute;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #2a3144 0%, #161a28 60%, #0a0d18 100%);
    border-radius: 2px;
    box-shadow:
      inset 0 0 0 0.5px rgba(255,255,255,0.06),
      0 0 8px rgba(0,0,0,0.6);
  }

  .lamp-base {
    position: absolute;
    bottom: -3px;
    width: 14px; height: 6px;
    border-radius: 2px;
    background: #0a0d18;
    transform: translateX(-50%);
  }

  /* Curved arm — drawn with SVG inside */
  .lamp-arm {
    position: absolute;
    overflow: visible;
  }

  /* Lamp head — fixture casing */
  .lamp-fixture {
    position: absolute;
    width: 26px; height: 9px;
    border-radius: 3px 3px 4px 4px;
    background: linear-gradient(180deg, #1c2236 0%, #0a0d18 100%);
    border: 1px solid #252b40;
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 -1px 2px rgba(0,0,0,0.5);
  }

  /* The neon tube */
  .lamp-tube {
    position: absolute;
    inset: 1.5px 2px 2.5px 2px;
    border-radius: 1px;
    background: var(--tube-off, #1a1f2e);
    transition: background 0.35s ease, box-shadow 0.5s ease;
  }

  .lamp.lit .lamp-tube {
    background: var(--tube-on, #f0c8ff);
    box-shadow:
      0 0 3px var(--tube-on, #f0c8ff),
      0 0 10px var(--neon-magenta, #ff5fea),
      0 0 22px var(--neon-magenta, #ff5fea),
      0 0 44px var(--neon-magenta-soft, rgba(255,95,234,0.7));
  }

  /* Halo — soft bloom */
  .lamp-halo {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.2);
    background: radial-gradient(circle,
      var(--neon-magenta, #ff5fea) 0%,
      var(--neon-magenta-soft, rgba(255,95,234,0.6)) 25%,
      transparent 70%);
    opacity: 0;
    mix-blend-mode: screen;
    filter: blur(2px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    pointer-events: none;
  }
  .lamp.lit .lamp-halo {
    opacity: 0.95;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Secondary blue halo for the duotone effect */
  .lamp-halo-2 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    background: radial-gradient(circle,
      var(--neon-blue, #5ec8ff) 0%,
      var(--neon-blue-soft, rgba(94,200,255,0.4)) 30%,
      transparent 75%);
    opacity: 0;
    mix-blend-mode: screen;
    filter: blur(8px);
    transition: opacity 1s ease, transform 1s ease;
    pointer-events: none;
  }
  .lamp.lit .lamp-halo-2 {
    opacity: 0.55;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Volumetric light cone falling toward ground */
  .lamp-cone {
    position: absolute;
    width: 100px; height: 200px;
    transform: translate(-50%, 0) scaleY(0);
    transform-origin: 50% 0%;
    background: linear-gradient(180deg,
      var(--neon-magenta-soft, rgba(255,95,234,0.5)) 0%,
      transparent 75%);
    clip-path: polygon(35% 0, 65% 0, 100% 100%, 0 100%);
    opacity: 0;
    mix-blend-mode: screen;
    filter: blur(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }
  .lamp.lit .lamp-cone {
    opacity: 0.55;
    transform: translate(-50%, 0) scaleY(1);
  }

  /* Activation pulse */
  .lamp.flashing .lamp-halo {
    animation: flash 0.9s ease-out;
  }
  @keyframes flash {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.1); }
    15%  { opacity: 1.4; transform: translate(-50%, -50%) scale(1.5); }
    35%  { opacity: 0.5; transform: translate(-50%, -50%) scale(0.95); }
    55%  { opacity: 1.1; transform: translate(-50%, -50%) scale(1.15); }
    100% { opacity: 0.95;transform: translate(-50%, -50%) scale(1); }
  }
  .lamp.flashing .lamp-tube {
    animation: tubeFlash 0.7s ease-out;
  }
  @keyframes tubeFlash {
    0%   { filter: brightness(0.3); }
    12%  { filter: brightness(2.6); }
    25%  { filter: brightness(0.7); }
    40%  { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }

  /* ── Child silhouette ─────────────────────────────── */
  .child {
    position: absolute;
    left: 50%;
    bottom: 14vh;
    transform: translateX(-50%);
    width: 70px; height: 130px;
    z-index: 10;
    will-change: transform;
    animation: walkBob 0.85s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
  }
  @keyframes walkBob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    25%      { transform: translateX(-50%) translateY(-2px) rotate(-0.3deg); }
    50%      { transform: translateX(-50%) translateY(0); }
    75%      { transform: translateX(-50%) translateY(-2px) rotate(0.3deg); }
  }

  .child-rim {
    position: absolute;
    inset: -30% -50%;
    background:
      radial-gradient(ellipse 50% 70% at 50% 30%, var(--neon-magenta-soft, rgba(255,95,234,0.5)) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 50% 90%, var(--neon-blue-soft, rgba(94,200,255,0.35)) 0%, transparent 70%);
    mix-blend-mode: screen;
    opacity: 0.0;
    filter: blur(10px);
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .child.glowing .child-rim { opacity: 1; }

  /* ── Snow ─────────────────────────────── */
  .snow-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    will-change: transform;
  }
  .snow-layer svg { width: 100%; height: 100%; display: block; }

  /* ── Vignette + grade ─────────────────────────────── */
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 90;
  }
  .grade {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(20,40,90,0.18) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.35) 100%),
      radial-gradient(ellipse 60% 40% at 50% 60%, transparent 60%, rgba(20, 8, 40, 0.3) 100%);
    pointer-events: none;
    mix-blend-mode: overlay;
    z-index: 91;
  }

  /* ── Foreground DOF blur — strong cinematic feel ── */
  .dof-near {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 16%;
    pointer-events: none;
    z-index: 92;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,1) 100%);
  }

  /* ── Homepage overlay ─────────────────────────────── */
  .overlay {
    position: absolute; inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
    padding: 40px 48px;
  }
  .overlay-top {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    pointer-events: auto;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo svg { width: 40px; height: 40px; }
  .logo .word {
    font-family: 'Syne', 'Inter', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: #f4f8fb;
  }
  .logo .word .accent { color: var(--brand-accent, #c4ff4d); }
  .nav {
    display: flex; gap: 28px;
    font-size: 13px;
    color: rgba(231, 236, 243, 0.72);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .nav a { color: inherit; text-decoration: none; cursor: pointer; }
  .nav a:hover { color: #fff; }

  .overlay-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--neon-magenta, #ff5fea);
    margin-bottom: 28px;
    font-weight: 600;
    text-shadow: 0 0 18px var(--neon-magenta-soft, rgba(255,95,234,0.6));
  }
  .headline {
    font-family: 'Syne', 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 6.8vw, 108px);
    line-height: 1.0;
    letter-spacing: -0.035em;
    color: #f4f8fb;
    text-shadow: 0 4px 50px rgba(0,0,0,0.7);
    max-width: 14ch;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, var(--neon-blue, #5ec8ff), var(--neon-magenta, #ff5fea));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .subcopy {
    margin-top: 28px;
    font-size: clamp(14px, 1.2vw, 17px);
    color: rgba(231, 236, 243, 0.78);
    line-height: 1.6;
    max-width: 540px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
  .cta {
    margin-top: 40px;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(6px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    pointer-events: auto;
    transition: background 0.2s, border 0.2s;
  }
  .cta:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.32);
  }
  .cta .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--neon-magenta, #ff5fea);
    box-shadow: 0 0 10px var(--neon-magenta, #ff5fea);
  }

  .overlay-bottom {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    font-size: 11px;
    color: rgba(231, 236, 243, 0.5);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: auto;
  }

  input, textarea, select { font-family: inherit; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="scene.jsx"></script>
</body>
</html>
